version: 2
builds:
  - id: airtruct
    main: ./cmd/airtruct
    binary: airtruct
    goos: [windows, darwin, linux]
    goarch: [amd64, arm64, arm]
    goarm: ["7"]
    ignore:
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: arm
    env:
      - CGO_ENABLED=0
    ldflags: >
      -s -w
      -X main.Version={{.Version}}
      -X main.DateBuilt={{.Date}}
archives:
  - id: airtruct
    ids: [airtruct]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
nfpms:
  - id: airtruct
    ids: [airtruct]
    package_name: airtruct
    vendor: sananguliyev
    homepage: https://github.com/sananguliyev/airtruct
    maintainer: Sanan Guliyev <sanan@airtruct.com>
    description: Self-hosted ETL platform for data integration
    license: Apache-2.0
    formats: [deb, rpm, apk]
    bindir: /usr/bin
homebrew_casks:
  - ids: [airtruct]
    repository:
      owner: sananguliyev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: https://github.com/sananguliyev/airtruct
    description: Self-hosted ETL platform for data integration
    binaries: [airtruct]
dist: target/dist
release:
  github:
    owner: sananguliyev
    name: airtruct
  prerelease: auto
  disable: false
